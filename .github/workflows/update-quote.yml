---
name: Update Daily Quote

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - develop

jobs:
  update-quote:
    name: Update Quote
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: ЁЯУе Checkout
        uses: actions/checkout@v6

      - name: ЁЯМР Fetch quote
        id: quote
        run: |
          MAX_RETRIES=3
          RETRY_DELAY=30

          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "ЁЯФД Attempt $attempt/$MAX_RETRIES..."

            HTTP_CODE=$(curl -s -o /tmp/quotes.json -w "%{http_code}" "https://zenquotes.io/api/random")
            CURL_EXIT=$?

            if [[ $CURL_EXIT -ne 0 ]]; then
              echo "тЭМ curl failed with exit code $CURL_EXIT"
              echo "тП│ Retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
              continue
            fi

            if [[ "$HTTP_CODE" != "200" ]]; then
              echo "тЭМ API error тАФ HTTP $HTTP_CODE"
              echo "ЁЯУД Response body: $(cat /tmp/quotes.json)"
              echo "тП│ Retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
              continue
            fi

            echo "тЬЕ API responded with HTTP $HTTP_CODE"

            QUOTE_TEXT=$(jq -r '.[0].q' /tmp/quotes.json)
            AUTHOR_TEXT=$(jq -r '.[0].a' /tmp/quotes.json)

            if [[ -z "$QUOTE_TEXT" || "$QUOTE_TEXT" == "null" ]]; then
              echo "тЭМ Failed to parse JSON response"
              echo "ЁЯУД Body: $(cat /tmp/quotes.json)"
              echo "тП│ Retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
              continue
            fi

            QUOTE=$(jq -rj '.[0].q | @uri' /tmp/quotes.json)
            AUTHOR=$(jq -rj '.[0].a | @uri' /tmp/quotes.json)

            echo "ЁЯТм Quote: \"$QUOTE_TEXT\""
            echo "ЁЯСд Author: $AUTHOR_TEXT"
            echo "quote=$QUOTE" >> "$GITHUB_OUTPUT"
            echo "author=$AUTHOR" >> "$GITHUB_OUTPUT"
            exit 0
          done

          echo "тЭМ All $MAX_RETRIES attempts failed. Aborting."
          exit 1

      - name: тЬПя╕П Update README quote
        run: |
          QUOTE="${{ steps.quote.outputs.quote }}"
          AUTHOR="${{ steps.quote.outputs.author }}"
          NEW_IMG="  <img src=\"https://quotes-github-readme.vercel.app/api?type=horizontal&theme=nord&quote=${QUOTE}&author=${AUTHOR}\" alt=\"Quote of the day\" />"
          awk -v new_img="$NEW_IMG" '/alt="Quote of the day"/{print new_img; next} {print}' README.md > README.tmp && mv README.tmp README.md
          echo "тЬЕ README updated successfully"

      - name: ЁЯЪА Commit & push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "тД╣я╕П No changes to commit"
            exit 0
          fi
          git add README.md
          git commit -m "ЁЯдЦ Update quote [skip ci]"
          git push
          echo "тЬЕ Changes pushed successfully"
